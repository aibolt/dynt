<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DYNT Formation browser verification</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="../../packages/formation/src/styles.css">
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, sans-serif;
      }

      body {
        background: #090b10;
        color: #e7edf7;
        margin: 0;
        padding: 2rem;
      }

      main,
      nav,
      .controls {
        display: grid;
        gap: 1rem;
      }

      main {
        margin-block: 2rem;
        max-width: 44rem;
      }

      .target {
        background: #111827;
        border: 0;
        color: inherit;
        display: block;
        min-height: 3rem;
        padding: 1rem;
      }

      a,
      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .controls {
        grid-template-columns: repeat(3, max-content);
      }

      output {
        display: block;
        font-family: ui-monospace, monospace;
        margin-top: 1rem;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>Formation browser verification</h1>

    <div class="controls">
      <button id="form-all" type="button">Form all</button>
      <button id="withdraw-all" type="button">Withdraw all</button>
      <button id="add-target" type="button">Add target</button>
    </div>

    <main id="app">
      <section id="section-target" class="target line-push-target">
        <h2>Section surface</h2>
        <p>The host section remains structurally unchanged.</p>
      </section>

      <nav aria-label="Verification links">
        <a id="link-target" class="target line-push-target" href="#verified">Focusable link</a>
      </nav>

      <button id="button-target" class="target line-push-target" type="button">Focusable button</button>

      <label class="target line-push-target" for="input-target">
        Text input
        <input id="input-target" type="text" value="Editable value">
      </label>

      <article id="line-rise-target" class="target line-rise-target">
        Line Rise surface
      </article>

      <article id="arc-trace-target" class="target arc-trace-target">
        Arc Trace surface
      </article>

      <article id="squircle-sweep-target" class="target squircle-sweep-target">
        Squircle Sweep surface
      </article>

      <article id="chamfer-fold-target" class="target chamfer-fold-target">
        Chamfer Fold surface
      </article>

      <article id="magnetic-segment-target" class="target magnetic-segment-target">
        Magnetic Segment surface
      </article>

      <article id="radial-compass-target" class="target radial-compass-target">
        Radial Compass surface
      </article>

      <article id="aperture-iris-target" class="target aperture-iris-target">
        Aperture Iris surface
      </article>

      <article id="elastic-membrane-target" class="target elastic-membrane-target">
        Elastic Membrane surface
      </article>
    </main>

    <output id="status" aria-live="polite"></output>

    <script type="module">
      import { createFormation } from "../../packages/formation/dist/index.js";

      const app = document.querySelector("#app");
      const status = document.querySelector("#status");
      const linePush = createFormation({
        root: app,
        selector: ".line-push-target",
        observe: true,
        viewportFlow: {
          duration: 820,
          lineLength: 680,
          overrun: 36,
          stagger: 140,
        },
        tokens: {
          duration: 160,
          easing: "cubic-bezier(0.22, 1, 0.36, 1)",
          fillColor: "rgb(8 24 32 / 0.92)",
          lineColor: "#67e8f9",
          lineStyle: "solid",
          lineWidth: "1px",
          overflow: 14,
        },
      });
      const lineRise = createFormation({
        root: app,
        selector: ".line-rise-target",
        profile: "line-rise",
        observe: true,
        tokens: {
          duration: 160,
          fillColor: "rgb(8 24 32 / 0.92)",
          lineColor: "#a7f3d0",
          lineStyle: "dashed",
          lineWidth: "1px",
          overflow: 10,
        },
      });
      const arcTrace = createFormation({
        root: app,
        selector: ".arc-trace-target",
        profile: "arc-trace",
        observe: true,
        tokens: {
          duration: 160,
          fillColor: "rgb(8 24 32 / 0.92)",
          lineColor: "#f0abfc",
          lineStyle: "dashed",
          lineWidth: "1px",
          radius: "18px",
        },
      });
      const constructedProfiles = [
        ["squircle-sweep", "#7dd3fc"],
        ["chamfer-fold", "#fb7185"],
        ["magnetic-segment", "#c4b5fd"],
        ["radial-compass", "#fde047"],
        ["aperture-iris", "#f9a8d4"],
        ["elastic-membrane", "#86efac"],
      ].map(([profile, lineColor]) => createFormation({
        root: app,
        selector: `.${profile}-target`,
        profile,
        observe: true,
        viewportFlow: {
          duration: 520,
          lineLength: 520,
          overrun: 32,
          stagger: 0,
        },
        tokens: {
          duration: 260,
          fillColor: "rgb(8 24 32 / 0.92)",
          lineColor,
          lineWidth: "1px",
        },
      }));
      const formations = [linePush, lineRise, arcTrace, ...constructedProfiles];

      function renderStatus() {
        status.textContent = formations
          .flatMap((formation) => formation.elements)
          .map((element) => `${element.id || element.tagName.toLowerCase()}:${element.dataset.dyntFormationPhase}`)
          .join("\n");
      }

      function afterTransition() {
        window.setTimeout(renderStatus, 220);
      }

      document.querySelector("#form-all").addEventListener("click", () => {
        formations.forEach((formation) => formation.form());
        renderStatus();
        afterTransition();
      });
      document.querySelector("#withdraw-all").addEventListener("click", () => {
        formations.forEach((formation) => formation.withdraw());
        renderStatus();
        afterTransition();
      });
      document.querySelector("#add-target").addEventListener("click", () => {
        const article = document.createElement("article");
        article.id = `dynamic-${formations.flatMap((formation) => formation.elements).length + 1}`;
        article.className = "target line-push-target";
        article.textContent = "Dynamically observed article";
        app.append(article);
        afterTransition();
      });
      app.addEventListener("transitionend", renderStatus);
      renderStatus();
      afterTransition();
    </script>
  </body>
</html>
